<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D47A1"/>
      <stop offset="50%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#1976D2"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F"/>
      <stop offset="100%" style="stop-color:#FF8F00"/>
    </linearGradient>
    <linearGradient id="bag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E1"/>
      <stop offset="100%" style="stop-color:#FFE082"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect x="20" y="20" width="472" height="472" rx="96" ry="96"
        fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Briefcase body -->
  <rect x="106" y="200" width="300" height="210" rx="22" ry="22"
        fill="url(#bag)" filter="url(#shadow)"/>

  <!-- Briefcase top flap -->
  <rect x="106" y="200" width="300" height="90" rx="22" ry="22"
        fill="#FFD54F"/>
  <rect x="106" y="258" width="300" height="32" fill="#FFD54F"/>

  <!-- Briefcase handle -->
  <path d="M196 200 L196 168 Q196 148 216 148 L296 148 Q316 148 316 168 L316 200"
        fill="none" stroke="#FF8F00" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center clasp -->
  <rect x="228" y="278" width="56" height="36" rx="10" ry="10" fill="#FF8F00"/>
  <rect x="240" y="288" width="32" height="16" rx="6" ry="6" fill="#FFD54F"/>

  <!-- Left divider line -->
  <line x1="106" y1="290" x2="228" y2="290" stroke="#F0C030" stroke-width="3" opacity="0.5"/>
  <!-- Right divider line -->
  <line x1="284" y1="290" x2="406" y2="290" stroke="#F0C030" stroke-width="3" opacity="0.5"/>

  <!-- Rs symbol on bag -->
  <text x="256" y="382" font-family="Arial Black, sans-serif" font-size="64" font-weight="900"
        fill="#0D47A1" text-anchor="middle" opacity="0.85">₨</text>

  <!-- Small decorative dots top -->
  <circle cx="160" cy="142" r="8" fill="rgba(255,255,255,0.15)"/>
  <circle cx="352" cy="142" r="8" fill="rgba(255,255,255,0.15)"/>

  <!-- Shine highlight -->
  <ellipse cx="200" cy="230" rx="60" ry="20" fill="rgba(255,255,255,0.18)" transform="rotate(-15,200,230)"/>
</svg>
